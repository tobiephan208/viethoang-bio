<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑷𝒉𝒂𝒏 𝑽𝒊𝒆𝒕 𝑯𝒐𝒂𝒏𝒈 :3</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(rgba(10, 20, 30, 0.4), rgba(10, 20, 30, 0.6)), 
                        url('https://i.ibb.co/d4LbxjMp/B48-B9-E41-6-AD4-40-EC-8-DEE-A8738-B574897.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; 
            pointer-events: none; 
        }

        header {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            font-weight: 600;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            position: relative;
            padding-bottom: 5px;
        }

        nav a:hover, nav a.active {
            color: #fff;
        }
        nav a.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: #fff;
            border-radius: 2px;
        }

        main {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 20px;
            text-align: center;
        }

        .avatar-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 10px;
        }
        
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            padding: 40px; 
        }

        .avatar-frame {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            pointer-events: none;
        }

        .profile-name {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #b59dfa, #71cdfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .verified-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .verified-badge img {
            width: 36px;
            height: 36px;
            object-fit: contain;
            filter: drop-shadow(0 0 4px rgba(29, 155, 240, 0.4));
        }

        .slogan-container {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.75);
            font-style: italic;
            font-weight: 400;
            min-height: 24px;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s ease;
            opacity: 1;
            transform: translateY(0);
        }

        .slogan-container.fade-out {
            opacity: 0;
            transform: translateY(-5px);
        }

        .social-container {
            display: flex;
            align-items: center;
            gap: 0px;
            background: rgba(13, 20, 33, 0.35);
            padding: 10px 15px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.15),
                0 10px 30px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            margin-bottom: 30px;
            width: 100%;
            max-width: 440px;
            justify-content: space-around;
        }

        .social-item {
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex: 1;
            position: relative;
            padding: 5px 0;
        }

        .social-item:not(:last-child)::after {
            content: '';
            position: absolute;
            right: 0;
            top: 15%;
            height: 70%;
            width: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        .social-item:hover {
            color: #fff;
            transform: scale(1.15);
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        .social-item i {
            font-size: 1.4rem;
        }

        .fa-github { color: #ffffff; }
        .fa-facebook { color: #1877f2; }
        .fa-discord { color: #5865f2; }

        .zalo-icon {
            background: #0068ff;
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 6px;
            border-radius: 7px;
            line-height: 1;
            box-shadow: 0 2px 6px rgba(0, 104, 255, 0.3);
        }

        .donate-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .donate-title {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .qr-card {
            background: rgba(13, 20, 33, 0.4);
            padding: 10px;
            border-radius: 20px;
            border: 1.5px solid rgba(0, 102, 255, 0.45);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(0, 102, 255, 0.35);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: all 0.3s ease;
        }

        .qr-card:hover {
            box-shadow: 
                inset 0 1px 4px rgba(255, 255, 255, 0.2),
                0 0 30px rgba(0, 102, 255, 0.6);
            transform: translateY(-2px);
        }

        .qr-code {
            width: 140px;
            height: 140px;
            display: block;
            border-radius: 12px;
        }

        footer {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 15px 5%;
            background: rgba(10, 15, 30, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .music-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 12, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .music-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .music-popup {
            background: rgba(13, 20, 33, 0.5);
            padding: 30px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 20px 50px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            animation: popupIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes popupIn {
            to { transform: scale(1); }
        }

        .music-popup h2 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            font-weight: 600;
            background: linear-gradient(to right, #b59dfa, #71cdfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .music-popup p {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .music-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .music-btn {
            padding: 11px 28px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            outline: none;
        }

        .btn-yes {
            background: linear-gradient(135deg, #71cdfa, #5865f2);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.35);
        }

        .btn-yes:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.55);
            filter: brightness(1.1);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-no:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 10px;
                padding: 12px;
            }
            nav { gap: 15px; }
            .avatar-container {
                width: 260px;
                height: 260px;
            }
            .avatar-img {
                padding: 35px; 
            }
            .profile-name { font-size: 2rem; }
            .verified-badge img {
                width: 32px;
                height: 32px;
            }
            .social-container { 
                width: 90%; 
                padding: 10px;
            }
            footer {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 8px;
            }
            .music-popup {
                padding: 25px 30px;
            }
        }
    </style>
</head>
<body>

    <canvas id="snow-canvas"></canvas>

    <div class="music-overlay" id="musicOverlay">
        <div class="music-popup">
            <h2>Hệ thống âm thanh</h2>
            <p>Bạn có muốn bật nhạc nền "Cũng Đành Thôi - QTrung Remix" để trải nghiệm website tuyệt vời hơn không?</p>
            <div class="music-buttons">
                <button class="music-btn btn-yes" id="btnYes"><i class="fa-solid fa-music"></i> Có chứ</button>
                <button class="music-btn btn-no" id="btnNo">Không</button>
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="Cũng Đành Thôi - QTrung Remix-765695500.mp3" type="audio/mpeg">
    </audio>

    <main>
        <div class="avatar-container">
            <img src="https://i.ibb.co/fVrmnbP1/923-FBA2-C-9-D39-4-E0-B-8646-B4-F25-AEDB29-A.jpg" alt="Avatar" class="avatar-img">
            <img src="https://i.ibb.co/7d8CjF0y/81-A36-D1-A-6167-4-DA9-AE9-A-C5-F5-ECE7-CA04-removebg-preview.png" alt="Khung Viền" class="avatar-frame">
        </div>
        
        <h1 class="profile-name">
            Phan Việt Hoàng
            <span class="verified-badge">
                <img src="https://i.ibb.co/Nd6Ccyc4/053-D896-A-2029-42-B1-814-A-56466242-E6-A5.jpg" alt="Tích xanh xác minh">
            </span>
        </h1>

        <div class="slogan-container" id="slogan-text">Loading slogan...</div>

        <div class="social-container">
            <a href="https://github.com/tobiephan208" target="_blank" class="social-item">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://facebook.com/pnhhz" target="_blank" class="social-item">
                <i class="fab fa-facebook"></i>
            </a>
            <a href="https://discord.gg/ujBGXTEgEc" target="_blank" class="social-item">
                <i class="fab fa-discord"></i>
            </a>
            <a href="https://zalo.me/84366474283" target="_blank" class="social-item">
                <span class="zalo-icon">Zalo</span>
            </a>
        </div>

        <div class="donate-section">
            <p class="donate-title"><i class="fa-regular fa-heart"></i> Ủng Hộ Mình:</p>

            <div class="qr-card">
                <img src="https://i.ibb.co/5hBTmFn6/3-CE3-E3-D2-0922-4-A5-B-9-DEE-B186-EB6-C7-C9-B.jpg" alt="Mã QR" class="qr-code">
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-item">
            © Phan Viet Hoang 2026
        </div>
    </footer>

    <script>
        const slogans = [
            "“Lời hứa như gió mây bay, hứa hẹn một đời rồi cũng chia tay😔.”",
            "“Không ai sống ở quá khứ mãi mãi, chỉ là họ tiếc nuối một người.”",
            "“NYC là thứ rẻ rách.”",
            "“Kỷ niệm dù đẹp đến mấy rồi cũng chỉ là 'kỷ niệm'.”"
        ];
        
        let currentSloganIndex = 0;
        const sloganElement = document.getElementById('slogan-text');

        function changeSlogan() {
            sloganElement.classList.add('fade-out');
            
            setTimeout(() => {
                currentSloganIndex = (currentSloganIndex + 1) % slogans.length;
                sloganElement.innerText = slogans[currentSloganIndex];
                sloganElement.classList.remove('fade-out');
            }, 600);
        }
        
        sloganElement.innerText = slogans[0];
        setInterval(changeSlogan, 4000);


        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const numFlakes = 80; 
        const flakes = [];

        for (let i = 0; i < numFlakes; i++) {
            flakes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 3 + 1, 
                d: Math.random() * numFlakes, 
                speed: Math.random() * 1 + 0.5 
            });
        }

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255, 255, 255, 0.75)"; 
            ctx.beginPath();
            for (let i = 0; i < numFlakes; i++) {
                const f = flakes[i];
                ctx.moveTo(f.x, f.y);
                ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true);

                f.y += f.speed;
                f.x += Math.sin(f.d) * 0.5;
                f.d += 0.01;

                if (f.y > canvas.height || f.x > canvas.width || f.x < 0) {
                    flakes[i] = {
                        x: Math.random() * canvas.width,
                        y: -10,
                        r: f.r,
                        d: f.d,
                        speed: f.speed
                    };
                }
            }
            ctx.fill();
            requestAnimationFrame(drawSnow);
        }

        drawSnow();

        const audio = document.getElementById('bg-music');
        const overlay = document.getElementById('musicOverlay');
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');

        btnYes.addEventListener('click', () => {
            audio.play().catch(err => console.log("Lỗi phát nhạc:", err));
            overlay.classList.add('fade-out');
        });

        btnNo.addEventListener('click', () => {
            overlay.classList.add('fade-out');
        });
    </script>
</body>
</html>
